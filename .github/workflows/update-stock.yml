name: Update Stock API

on:

  schedule:
    - cron: "0 10 * * *"

  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version: 22

      - run: npm install

      - run: node scripts/updateStocks.js

      - name: Commit

        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add api/stocks.json

          git diff --cached --quiet || git commit -m "update stocks"

          git push
